<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/styles.css"> <!-- Adjusted the path assuming css folder is outside html folder -->
</head>
<body>
    <header class="bg-info text-white text-center py-4">
        <h1>Reports</h1>
    </header>
    <main class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-10">
                <h2>Contribution and Fund Disbursement Reports</h2>
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Member</th>
                            <th>Contribution Amount</th>
                            <th>Fund Disbursement Amount</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Example rows (Replace with dynamic data) -->
                        <tr>
                            <td>2025-01-31</td>
                            <td>John Doe</td>
                            <td>$100</td>
                            <td>$1200</td>
                        </tr>
                        <tr>
                            <td>2025-02-28</td>
                            <td>Jane Smith</td>
                            <td>$100</td>
                            <td>$1200</td>
                        </tr>
                        <!-- Add more rows as needed -->
                    </tbody>
                </table>
                <button class="btn btn-info">Export as CSV</button>
                <button class="btn btn-info">Export as PDF</button>
            </div>
        </div>
    </main>
    <footer class="bg-light text-center py-4 mt-5">
        <p>&copy; 2025 Thrift Management System. All rights reserved.</p>
    </footer>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
